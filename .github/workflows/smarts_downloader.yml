name: Smarts Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to download"
        required: true
        default: "https://example.com"
      filename:
        description: "Output file name"
        required: true
        default: "page.html"

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Python Downloader
        run: |
          python scripts/save_page.py \
            "${{ github.event.inputs.url }}" \
            "${{ github.event.inputs.filename }}"

      # ۱) آپلود به عنوان Artifact (روش معمول گیت‌هاب)
      - name: Upload as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-file
          path: ${{ github.event.inputs.filename }}

      # ۲) آپلود روی transfer.sh و چاپ لینک در خروجی
      - name: Upload to Transfer.sh
        run: |
          echo "Uploading to transfer.sh..."
          RESPONSE=$(curl --silent --upload-file \
            "${{ github.event.inputs.filename }}" \
            "https://transfer.sh/${{
