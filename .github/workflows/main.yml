name: Automated Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to download'
        required: true

jobs:
  download-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pyppeteer
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libnss3 libatk-bridge2.0-0 libgtk-3-0 # این‌ها برای اجرای مرورگر ضروری هستند

      - name: Run Downloader
        run: |
          python save_as_mhtml.py --url "${{ github.event.inputs.url }}"

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "New Download: $(date)" || echo "No changes"
          git push
