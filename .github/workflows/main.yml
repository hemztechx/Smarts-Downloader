name: Automated Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the page/file to download'
        required: true
        default: ''

permissions:
  contents: write

jobs:
  download-process:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # اضافه کردن کتابخانه‌های احتمالی مورد نیاز
          pip install requests

      - name: Run Downloader
        run: |
          # اجرای اسکریپت با ورودی URL
          python save_as_mhtml.py "${{ github.event.inputs.url }}"

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Automated download: $(date)" || echo "No changes to commit"
          git push
