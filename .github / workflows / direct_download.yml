name: MHTML Page Downloader

on:
  workflow_dispatch:
    inputs:
      page_url:
        description: "Enter the page URL to save as MHTML"
        required: true
        type: string
      output_name:
        description: "Optional: custom output file name (without extension)"
        required: false
        type: string

jobs:
  save_page_as_mhtml:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: Create downloads directory if not exists
        run: mkdir -p downloads

      - name: Save page as MHTML
        run: |
          python scripts/save_as_mhtml.py \
            --url "${{ github.event.inputs.page_url }}" \
            --output "${{ github.event.inputs.output_name || '' }}"

      - name: Commit & Push MHTML file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add downloads || echo "Nothing to add"
          git commit -m "Added MHTML page automatically" || echo "Nothing to commit"
          git push || echo "Nothing to push"
